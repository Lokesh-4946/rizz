name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.os }} · lint · type-check · test · eval · footprint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Cross-platform from day one (decision D-008). The lightweight constraint and
        # path/shell differences are first-class CI concerns on all three OSes.
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Test (vitest)
        run: pnpm test

      - name: Eval suite
        run: pnpm eval

      - name: Footprint / cold-start budget
        run: pnpm footprint
